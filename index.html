<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
    text-align: center;
}

h1 {
    margin-top: 20vh;
    font-size: 2.5rem;
}

#message {
    font-size: 1.2rem;
    margin-top: 20px;
}

/* Hearts animation */
.heart {
    position: fixed;
    bottom: -10px;
    color: red;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}

/* Button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: pink;
    cursor: pointer;
}

/* Canvas fireworks */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<h1>🎉 Happy Birthday My Love ❤️</h1>
<div id="message"></div>

<button onclick="startSurprise()">Click for Surprise 🎁</button>

<!-- Romantic Music -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
// Typing Effect
const text = "You are my happiness, my love, my everything 💖\nI am so lucky to have you in my life ❤️\nHappy Birthday jaan 🎂✨";
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}

// Start everything
function startSurprise() {
    document.getElementById("music").play();
    typeWriter();
    createHearts();
    startFireworks();
}

// Hearts generator
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
}

// Fireworks
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
    for (let i = 0; i < 50; i++) {
        particles.push({
            x: x,
            y: y,
            speedX: (Math.random() - 0.5) * 6,
            speedY: (Math.random() - 0.5) * 6,
            life: 100
        });
    }
}

function startFireworks() {
    setInterval(() => {
        createFirework(Math.random() * canvas.width, Math.random() * canvas.height);
    }, 800);

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        ctx.fillStyle = "white";
        ctx.fillRect(p.x, p.y, 2, 2);

        if (p.life <= 0) particles.splice(index, 1);
    });
}
</script>

</body>
</html>
